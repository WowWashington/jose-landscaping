services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # Persistent data — survives container restarts/rebuilds
      - app-data:/app/data
      - app-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/jose.db
      - UPLOADS_DIR=/app/public/uploads

volumes:
  app-data:
  app-uploads:
