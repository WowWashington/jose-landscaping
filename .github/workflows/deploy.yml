name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg GITHUB_SHA=${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/field-service:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/field-service:latest \
            .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/field-service --all-tags

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to jose-services-app
        uses: azure/webapps-deploy@v2
        with:
          app-name: jose-services-app
          images: ${{ secrets.ACR_LOGIN_SERVER }}/field-service:${{ github.sha }}

      # To add more instances, duplicate the deploy step:
      # - name: Deploy to brian-services-app
      #   uses: azure/webapps-deploy@v2
      #   with:
      #     app-name: brian-services-app
      #     images: ${{ secrets.ACR_LOGIN_SERVER }}/field-service:${{ github.sha }}
